name: fetch-asset
# Relais d'assets : télécharge une URL publique et la committe sur la branche.
# Utile quand l'environnement de dev n'a pas accès au CDN d'images.
on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL publique du fichier à télécharger"
        required: true
      path:
        description: "Chemin de destination dans le repo"
        required: true
  # Déclenchement sans permission spéciale : committer .github/asset-requests.json
  # avec [{"url": "...", "path": "..."}] et le robot télécharge sur la branche.
  push:
    branches: ["claude/**"]
    paths: [".github/asset-requests.json"]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Download assets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo '[{"url": "${{ inputs.url }}", "path": "${{ inputs.path }}"}]' > /tmp/requests.json
          else
            cp .github/asset-requests.json /tmp/requests.json
          fi
          jq -c '.[]' /tmp/requests.json | while read -r req; do
            url=$(echo "$req" | jq -r .url)
            path=$(echo "$req" | jq -r .path)
            mkdir -p "$(dirname "$path")"
            curl -fsSL "$url" -o "$path"
            ls -la "$path"
          done
      - name: Commit
        run: |
          git config user.name "trillion-asset-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "chore: fetch assets (robot)" || echo "rien à committer"
          git push

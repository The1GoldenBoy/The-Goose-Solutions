<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRILLION</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <canvas id="cosmos"></canvas>

  <div class="shell">
    <aside class="sidebar">
      <div class="brand">TRILLION</div>
      <button id="empire-btn" class="empire-btn">❖ Empire Overview</button>
      <div class="sidebar-label">Active Ventures</div>
      <nav id="ventures-list"></nav>
      <button id="add-venture" class="add-btn" title="Add a business">+</button>
      <div class="sidebar-foot">
        <span id="brain-pill" class="pill-mini">…</span>
      </div>
    </aside>

    <main id="main">
      <!-- Écran d'accueil / nouvelle entreprise (§5) -->
      <section id="screen-welcome" class="screen">
        <div class="presence-wrap">
          <div class="presence" id="presence">
            <div class="presence-ring r1"></div>
            <div class="presence-ring r2"></div>
            <div class="presence-core"></div>
            <img id="presence-img" src="/assets/trillion.webp" alt="" onerror="this.remove()" />
          </div>
          <h1 class="presence-title">TRILLION</h1>
          <p class="presence-sub">Add a business. Give Trillion the Masterplan. She builds the cockpit.</p>
        </div>

        <div id="welcome-chat" class="welcome-chat"></div>

        <div class="composer glass">
          <textarea id="welcome-input" rows="3" placeholder="Talk with Trillion"></textarea>
          <div class="composer-row">
            <button id="welcome-mic" class="icon-btn" title="Parler à Trillion">🎙</button>
            <button id="welcome-send" class="send-btn">Send</button>
          </div>
        </div>
        <button id="create-masterplan" class="ghost-btn">Create a masterplan</button>
      </section>

      <!-- Le dashboard se bâtit sous les yeux (§6) -->
      <section id="screen-building" class="screen" hidden>
        <div class="building-head">
          <div class="presence small">
            <div class="presence-ring r1"></div>
            <div class="presence-core"></div>
          </div>
          <div>
            <h2 id="building-title">Trillion construit ton cockpit…</h2>
            <div id="building-steps" class="building-steps"></div>
          </div>
        </div>
        <div id="building-grid" class="grid"></div>
      </section>

      <!-- §15 : Empire Overview — « Qu'est-ce qui mérite mon attention maintenant ? » -->
      <section id="screen-empire" class="screen" hidden>
        <header class="dash-head glass">
          <div>
            <h2>Empire Overview</h2>
            <span class="pill-mini">Qu’est-ce qui mérite mon attention maintenant ?</span>
          </div>
          <div class="presence small"><div class="presence-ring r1"></div><div class="presence-core"></div></div>
        </header>
        <div id="empire-grid" class="grid"></div>
      </section>

      <!-- Dashboard d'un venture -->
      <section id="screen-dashboard" class="screen" hidden>
        <header class="dash-head glass">
          <div>
            <h2 id="dash-name">—</h2>
            <span id="dash-type" class="pill-mini"></span>
          </div>
          <div class="period-picker" id="period-picker">
            <button data-period="day">Jour</button>
            <button data-period="week">Semaine</button>
            <button data-period="month">Mois</button>
            <button data-period="year">Année</button>
            <button data-period="lifetime">Lifetime</button>
          </div>
        </header>
        <div id="dash-grid" class="grid"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
